  - id: "2026-03-15-installer-opencode-macos"
    titulo: "Installer macOS con launcher y modo Ollama"
    data: "2026-03-15"
    duracion: "~2h"
    peso: "medio"
    participantes: ["Claude"]
    objetivo: "Definir e implementar el flujo de instalacion y arranque local de OpenCode en macOS."

    features_implementadas:
      - nombre: "Installer y launcher con doble click"
        descripcion: "Scripts .command con terminal visible para instalar OpenCode y arrancar en carpeta elegida."
      - nombre: "Modo local con Ollama"
        descripcion: "Instalacion opcional de Ollama y descarga de qwen2.5-coder:14b con config local."
      - nombre: "Preferencia de idioma persistente"
        descripcion: "Pregunta de idioma en instalador y guardado en instructions-language.md."

    problemas_resueltos:
      - problema: "Evitar sobrescribir configuraciones existentes de OpenCode"
        solucion: "Configurar archivo dedicado opencode.ollama.json si ya existe opencode.json."
      - problema: "Disponibilidad de brew/opencode desde scripts GUI"
        solucion: "Forzar PATH y shellenv para /opt/homebrew/bin y /usr/local/bin."

    decisiones_tomadas:
      - decision: "Usar scripts .command con terminal visible en lugar de .app"
        justificacion: "Menor friccion inicial y sin necesidad de firma/notarizacion."
        adr_relacionada: null
      - decision: "Modelo local por defecto: qwen2.5-coder:14b"
        justificacion: "Mejor equilibrio calidad/latencia para M3 sin suscripcion."
        adr_relacionada: null

    tecnologias_agregadas:
      - nombre: "Ollama (opcional)"
        motivo: "Proveedor local sin suscripcion para ejecutar modelos en el equipo."

    deployments: []
    gotchas: []

    proximos_pasos:
      - "Probar el flujo completo en un Mac M3 real"
      - "Decidir si se empaqueta como .app firmado"
      - "Validar onboarding remoto vs local en usuarios no tecnicos"

    notas_adicionales: |
      Archivos clave del flujo: openkit_installer/OpenCode Installer.command y
      openkit_installer/OpenCode Launcher.command. Config local guardada en
      ~/.config/opencode/opencode.ollama.json (si opencode.json ya existe) y
      preferencia de idioma en ~/.config/opencode/instructions-language.md.
