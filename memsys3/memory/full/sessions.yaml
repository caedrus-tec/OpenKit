  - id: "2026-03-16-mejoras-ux-installer-qa"
    titulo: "Mejoras UX installer y QA para testers"
    data: "2026-03-16"
    duracion: "~2h"
    peso: "medio"
    participantes: ["OpenCode"]
    objetivo: "Mejorar UX del installer para usuarios no tecnicos y preparar QA para testers."

    features_implementadas:
      - nombre: "Confirmaciones y mensajes claros"
        descripcion: "Resumen antes de instalar Homebrew, aviso de ajuste de PATH y version de OpenCode visible tras instalar."
      - nombre: "Reconfiguracion de idioma"
        descripcion: "Opcion para revisar o cambiar idioma sin reinstalar."
      - nombre: "Validacion de auth y login remoto guiado"
        descripcion: "Validacion JSON de auth.json y menu para login remoto con opcion de omitir."
      - nombre: "Control de espacio y descarga Ollama"
        descripcion: "Chequeo en el volumen de modelos y confirmacion con estimacion de tiempo/espacio antes de descargar."
      - nombre: "Proteccion de sobrescrituras"
        descripcion: "Confirmacion y backup al reemplazar config y launcher del Escritorio."
      - nombre: "QA para testers"
        descripcion: "Documento QA_OPENKIT.txt con version corta y larga para pruebas guiadas."

    problemas_resueltos:
