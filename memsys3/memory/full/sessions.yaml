        solucion: "Validacion JSON antes de asumir credenciales."
      - problema: "Chequeo de espacio en volumen equivocado"
        solucion: "Usar ruta de modelos de Ollama (OLLAMA_MODELS/OLLAMA_HOME)."
      - problema: "Sobrescritura silenciosa de launcher y config"
        solucion: "Confirmaciones y backups con timestamp."

    decisiones_tomadas:
