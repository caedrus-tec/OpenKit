readme_proyecto:
  resumen: |
    OpenKit es un instalador para macOS Sonoma que deja OpenCode CLI listo para usar
    con un launcher de doble clic y terminal visible. El flujo publico para testers es:
    descargar ZIP de GitHub, ejecutar OpenCode Installer.command, seguir prompts guiados,
    y abrir proyectos con OpenCode Launcher.command desde el Escritorio.
  puntos_clave:
    - "Instalacion guiada de Homebrew, OpenCode y modo local opcional con Ollama"
    - "Modelo local recomendado: qwen2.5-coder:14b (~8-9 GB)"
    - "Ramas: dev para trabajo interno con memsys3, main para publicacion a testers"
    - "Ruta de soporte: auth/configs en ~/.local/share/opencode y ~/.config/opencode"

